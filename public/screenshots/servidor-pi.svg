<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#450a0a"/>
      <stop offset="60%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#fda4af" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9f1239" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <g font-family="Inter, system-ui, sans-serif" fill="#fff1f2">
    <text x="80" y="320" font-size="36" font-weight="500" opacity="0.7">Home server on Raspberry Pi 5</text>
    <text x="80" y="420" font-size="120" font-weight="800" letter-spacing="-3">servidor-pi</text>
    <text x="80" y="490" font-size="32" font-weight="500" opacity="0.85">Media stack + game finder + Windows agent</text>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#fda4af" font-size="20" font-weight="600" opacity="0.95">
    <rect x="80" y="560" width="155" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#fda4af" stroke-opacity="0.4"/>
    <text x="100" y="588">Docker</text>
    <rect x="255" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#fda4af" stroke-opacity="0.4"/>
    <text x="275" y="588">Jellyfin</text>
    <rect x="445" y="560" width="140" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#fda4af" stroke-opacity="0.4"/>
    <text x="465" y="588">*arr</text>
    <rect x="605" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#fda4af" stroke-opacity="0.4"/>
    <text x="625" y="588">Pi-hole</text>
  </g>
</svg>
