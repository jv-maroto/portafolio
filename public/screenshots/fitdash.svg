<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="60%" stop-color="#9d174d"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9d174d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <g font-family="Inter, system-ui, sans-serif" fill="#fdf4ff">
    <text x="80" y="320" font-size="36" font-weight="500" opacity="0.7">Multimodal local AI agent</text>
    <text x="80" y="420" font-size="120" font-weight="800" letter-spacing="-3">FitDash</text>
    <text x="80" y="490" font-size="32" font-weight="500" opacity="0.85">Personal fitness dashboard with Ollama + Whisper</text>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#f0abfc" font-size="20" font-weight="600" opacity="0.95">
    <rect x="80" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#f0abfc" stroke-opacity="0.4"/>
    <text x="100" y="588">FastAPI</text>
    <rect x="270" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#f0abfc" stroke-opacity="0.4"/>
    <text x="290" y="588">Telegram</text>
    <rect x="460" y="560" width="155" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#f0abfc" stroke-opacity="0.4"/>
    <text x="480" y="588">Ollama</text>
    <rect x="635" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#f0abfc" stroke-opacity="0.4"/>
    <text x="655" y="588">Whisper</text>
  </g>
</svg>
