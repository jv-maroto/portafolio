    <text x="80" y="490" font-size="32" font-weight="500" opacity="0.85">AI scene classification &amp; TMDB metadata</text>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#fed7aa" font-size="20" font-weight="600" opacity="0.95">
    <rect x="80" y="560" width="170" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#fed7aa" stroke-opacity="0.4"/>
    <text x="100" y="588">FastAPI</text>
