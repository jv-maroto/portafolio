  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#c4b5fd" font-size="20" font-weight="600" opacity="0.95">
    <rect x="80" y="560" width="160" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#c4b5fd" stroke-opacity="0.4"/>
