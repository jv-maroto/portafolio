<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="60%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <g font-family="Inter, system-ui, sans-serif" fill="#eff6ff">
    <text x="80" y="320" font-size="36" font-weight="500" opacity="0.7">Employee portal - live on Render</text>
    <text x="80" y="420" font-size="100" font-weight="800" letter-spacing="-2">Portal-Employes</text>
    <text x="80" y="490" font-size="32" font-weight="500" opacity="0.85">Payroll, time-off and internal announcements</text>
  </g>
  <g font-family="JetBrains Mono, ui-monospace, monospace" fill="#bae6fd" font-size="20" font-weight="600" opacity="0.95">
    <rect x="80" y="560" width="155" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#bae6fd" stroke-opacity="0.4"/>
    <text x="100" y="588">Django</text>
    <rect x="255" y="560" width="140" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#bae6fd" stroke-opacity="0.4"/>
    <text x="275" y="588">React</text>
    <rect x="415" y="560" width="165" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#bae6fd" stroke-opacity="0.4"/>
    <text x="435" y="588">Tailwind</text>
    <rect x="600" y="560" width="155" height="42" rx="10" fill="#0a0a0a" fill-opacity="0.3" stroke="#bae6fd" stroke-opacity="0.4"/>
    <text x="620" y="588">Render</text>
  </g>
</svg>
